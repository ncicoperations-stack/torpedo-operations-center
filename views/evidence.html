<div class="evidence-page">





    <!-- HEADER -->


    <section class="page-header">


        <div>


            <h1>

                Evidence Management

            </h1>


            <p>

                Evidence registry and chain of custody monitoring

            </p>


        </div>





        <button

        id="uploadEvidenceButton"

        class="primary-button">


            <i class="fa-solid fa-upload"></i>


            Register Evidence


        </button>



    </section>








    <!-- STATISTICS -->


    <section class="stats-grid">



        <div class="stat-card">


            <h3>

                Total Evidence

            </h3>


            <strong id="totalEvidence">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Secured

            </h3>


            <strong id="securedEvidence">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Under Review

            </h3>


            <strong id="pendingEvidence">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Restricted

            </h3>


            <strong id="restrictedEvidence">

                0

            </strong>


        </div>



    </section>








    <!-- SEARCH -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Evidence Search

            </h2>


        </div>





        <div class="search-bar">


            <input


            id="evidenceSearch"


            type="text"


            placeholder="Search evidence ID, case, type, custodian...">



        </div>



    </section>








    <!-- EVIDENCE TABLE -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Evidence Registry

            </h2>


        </div>





        <div class="table-container">



            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            Evidence ID

                        </th>



                        <th>

                            Case Reference

                        </th>



                        <th>

                            Type

                        </th>



                        <th>

                            Submitted By

                        </th>



                        <th>

                            Custodian

                        </th>



                        <th>

                            Status

                        </th>



                        <th>

                            Date

                        </th>



                        <th>

                            Action

                        </th>



                    </tr>


                </thead>





                <tbody id="evidenceTableBody">



                    <tr>


                        <td colspan="8">


                            Loading evidence...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>



    </section>






</div>
