<div class="analytics-page">





    <!-- HEADER -->


    <section class="page-header">


        <div>


            <h1>

                Analytics Center

            <p>

                Operational intelligence and performance analysis

        </div>





        <button

        id="refreshAnalytics"

            <i class="fa-solid fa-chart-line"></i>


            Refresh


        </button>



    </section>








    <!-- METRIC CARDS -->


    <section class="stats-grid">



        <div class="stat-card">

            <h3>

            <strong id="onlineScamCount">

        <div class="stat-card">


            <h3>

            </h3>


            <strong id="financialFraudCount">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Cybercrime

            </h3>


            <strong id="cybercrimeCount">

                0

            </strong>


        </div>



    </section>








    <!-- CHART AREA -->


    <section class="dashboard-grid">



        <div class="panel">


            <div class="panel-header">


                <h2>

                    Case Categories

                </h2>


            </div>





            <div class="panel-body">


                <canvas id="categoryChart"></canvas>


            </div>



        </div>







        <div class="panel">


            <div class="panel-header">


                <h2>

                    Status Overview

                </h2>


            </div>





            <div class="panel-body">


                <canvas id="statusChart"></canvas>


            </div>



        </div>



    </section>

    <section class="panel">



        <div class="panel-header">


            <h2>

                Intelligence Summary

            </h2>

        <div class="panel-body">



            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            Category

                        </th>



                        <th>

                            Reports

                        </th>



                        <th>

                            Active

                        </th>



                        <th>

                            Closed

                        </th>



                    </tr>


                </thead>





                <tbody id="analyticsTableBody">



                    <tr>


                        <td colspan="4">


                            Loading analytics...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>
