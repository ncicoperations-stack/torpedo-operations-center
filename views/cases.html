<div class="cases-page">



    <!-- HEADER -->


    <section class="page-header">


        <div>


            <h1>

                Case Management

            </h1>


            <p>

                Review and manage submitted intelligence reports

            </p>


        </div>





        <button

        id="refreshCases"

        class="primary-button">


            <i class="fa-solid fa-rotate"></i>


            Refresh


        </button>



    </section>








    <!-- CASE STATISTICS -->


    <section class="stats-grid">



        <div class="stat-card">


            <h3>

                Total Cases

            </h3>


            <strong id="caseTotal">

                0

            </strong>


        </div>





        <div class="stat-card">


            <h3>

                Received

            </h3>


            <strong id="caseReceived">

                0

            </strong>


        </div>





        <div class="stat-card">


            <h3>

                Active

            </h3>


            <strong id="caseActive">

                0

            </strong>


        </div>





        <div class="stat-card">


            <h3>

                Closed

            </h3>


            <strong id="caseClosed">

                0

            </strong>


        </div>



    </section>








    <!-- SEARCH -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Search Cases

            </h2>


        </div>





        <div class="search-bar">



            <input

            id="caseSearch"

            type="text"

            placeholder="Search reference, category, status...">





            <select id="caseFilter">


                <option value="">

                    All Categories

                </option>


                <option>

                    Online Scam

                </option>


                <option>

                    Identity Theft

                </option>


                <option>

                    Financial Fraud

                </option>


                <option>

                    Cybercrime

                </option>


                <option>

                    Honeytrap

                </option>


                <option>

                    Child Safety

                </option>



            </select>



        </div>



    </section>








    <!-- CASE TABLE -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Investigation Cases

            </h2>


        </div>





        <div class="table-container">


            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            Reference

                        </th>



                        <th>

                            Category

                        </th>



                        <th>

                            Location

                        </th>



                        <th>

                            Status

                        </th>



                        <th>

                            Assigned

                        </th>



                        <th>

                            Date

                        </th>



                        <th>

                            Action

                        </th>



                    </tr>


                </thead>




                <tbody id="casesTableBody">



                    <tr>


                        <td colspan="7">


                            Loading cases...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>



    </section>






</div>
