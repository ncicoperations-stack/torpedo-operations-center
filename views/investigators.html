<div class="investigators-page">





    <!-- HEADER -->


    <section class="page-header">


        <div>


            <h1>

                Investigator Management

            </h1>


            <p>

                Manage operational personnel and assignments

            </p>


        </div>





        <button

        id="addInvestigatorButton"

        class="primary-button">


            <i class="fa-solid fa-user-plus"></i>


            Add Investigator


        </button>



    </section>








    <!-- STATISTICS -->


    <section class="stats-grid">



        <div class="stat-card">


            <h3>

                Total Investigators

            </h3>


            <strong id="totalInvestigators">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Available

            </h3>


            <strong id="availableInvestigators">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Assigned Cases

            </h3>


            <strong id="assignedCases">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Restricted

            </h3>


            <strong id="restrictedInvestigators">

                0

            </strong>


        </div>



    </section>








    <!-- SEARCH PANEL -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Search Investigators

            </h2>


        </div>





        <div class="search-bar">


            <input


            id="investigatorSearch"


            type="text"


            placeholder="Search name, department, clearance...">



        </div>



    </section>








    <!-- INVESTIGATOR TABLE -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Personnel Directory

            </h2>


        </div>





        <div class="table-container">



            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            ID

                        </th>



                        <th>

                            Name

                        </th>



                        <th>

                            Department

                        </th>



                        <th>

                            Clearance

                        </th>



                        <th>

                            Status

                        </th>



                        <th>

                            Cases

                        </th>



                        <th>

                            Last Activity

                        </th>



                        <th>

                            Action

                        </th>



                    </tr>


                </thead>





                <tbody id="investigatorTableBody">



                    <tr>


                        <td colspan="8">


                            Loading investigators...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>



    </section>






</div>
