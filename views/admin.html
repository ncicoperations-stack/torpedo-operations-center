<div class="admin-page">





    <!-- HEADER -->


    <section class="page-header">


        <div>


            <h1>

                Administration Center

            </h1>


            <p>

                Manage users, permissions, and system activity

            </p>


        </div>





        <button

        id="createUserButton"

        class="primary-button">


            <i class="fa-solid fa-user-plus"></i>


            Create User


        </button>



    </section>








    <!-- ADMIN STATISTICS -->


    <section class="stats-grid">



        <div class="stat-card">


            <h3>

                Total Users

            </h3>


            <strong id="adminUsers">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Active Users

            </h3>


            <strong id="activeUsers">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                Audit Events

            </h3>


            <strong id="auditEvents">

                0

            </strong>


        </div>






        <div class="stat-card">


            <h3>

                System Status

            </h3>


            <strong>

                Online

            </strong>


        </div>



    </section>








    <!-- USERS PANEL -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                User Management

            </h2>



            <button

            id="refreshAdmin"

            class="table-button">


                Refresh


            </button>


        </div>





        <div class="table-container">



            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            User ID

                        </th>



                        <th>

                            Name

                        </th>



                        <th>

                            Role

                        </th>



                        <th>

                            Status

                        </th>



                        <th>

                            Last Login

                        </th>



                        <th>

                            Action

                        </th>



                    </tr>


                </thead>





                <tbody id="usersTableBody">



                    <tr>


                        <td colspan="6">


                            Loading users...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>



    </section>








    <!-- AUDIT LOG -->


    <section class="panel">



        <div class="panel-header">


            <h2>

                Audit Log

            </h2>


        </div>





        <div class="table-container">



            <table class="data-table">



                <thead>


                    <tr>



                        <th>

                            Event ID

                        </th>



                        <th>

                            User

                        </th>



                        <th>

                            Action

                        </th>



                        <th>

                            Date

                        </th>



                    </tr>


                </thead>





                <tbody id="auditTableBody">



                    <tr>


                        <td colspan="4">


                            Loading audit records...


                        </td>


                    </tr>



                </tbody>



            </table>



        </div>



    </section>






</div>
