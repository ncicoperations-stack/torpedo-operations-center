<div class="statusbar">

    <!-- LEFT -->

    <div class="status-left">

        <span>

            <i class="fa-solid fa-shield-halved"></i>

            TORPEDO Operations Center

        </span>

        <span>

            Version:
            <strong>2.0.0</strong>

        </span>

    </div>





    <!-- CENTER -->

    <div class="status-center">

        <span>

            Backend:

            <strong id="backendStatus">

                Online

            </strong>

        </span>

        <span>

            API:

            <strong id="apiLatency">

                --
            </strong>

            ms

        </span>

    </div>





    <!-- RIGHT -->

    <div class="status-right">

        <span id="utcClock">

            --:--:--

        </span>

        <span>

            UTC

        </span>

    </div>

</div>

<script>

(function(){

    function updateClock(){

        const now = new Date();

        const utc = now.toLocaleTimeString(
            "en-GB",
            {
                hour12:false,
                timeZone:"UTC"
            }
        );

        const clock = document.getElementById("utcClock");

        if(clock){

            clock.textContent = utc;

        }

    }

    updateClock();

    setInterval(updateClock,1000);

})();

</script>
